services:
  # DataBase PostgreSQL
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: factory_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
    ports:
      - "5432:5432"

  # Servidor Web + PHP
  app:
    image: php:8.2-apache
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db